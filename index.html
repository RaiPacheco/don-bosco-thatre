<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Theatre Seat Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #000;
            color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "San Francisco", sans-serif;
        }
        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .seat { transition: all 0.2s ease; }
        .seat:hover { transform: scale(1.05); }
        .selected { background: #0a84ff !important; }
        .taken { background: #2c2c2e !important; color: #666; }
    </style>
</head>

<body class="p-6">
    <h1 class="text-3xl font-semibold text-center mb-8 tracking-tight">🎭 Theatre Booking</h1>

    <div class="glass rounded-2xl p-6 max-w-2xl mx-auto mb-8 shadow-2xl">
        <div id="seatGrid" class="grid grid-cols-8 gap-3"></div>
    </div>

    <div class="glass rounded-2xl p-6 max-w-2xl mx-auto shadow-2xl">
        <h2 class="text-xl font-medium mb-4 text-gray-200">Selected Seats</h2>
        <div id="selectedSeats" class="space-y-3"></div>
        <div class="flex justify-between items-center mt-6 pt-4 border-t border-gray-700">
            <span class="text-lg text-gray-400">Total</span>
            <span class="text-2xl font-semibold">$<span id="totalPrice">0</span></span>
        </div>
        <button id="confirmBtn" class="mt-6 w-full bg-white text-black py-3 rounded-xl font-medium hover:bg-gray-200 transition">
            Confirm Booking
        </button>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
