<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Theatre Seat Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #000;
            color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "San Francisco", sans-serif;
        }
        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .seat { transition: all 0.2s ease; }
        .seat:hover { transform: scale(1.05); }
        .selected { background: #0a84ff !important; }
        .taken { background: #2c2c2e !important; color: #666; }
    </style>
</head>

<body class="p-6">
    <h1 class="text-3xl font-semibold text-center mb-8 tracking-tight">🎭 Theatre Booking</h1>

    <div class="glass rounded-2xl p-6 max-w-2xl mx-auto mb-8 shadow-2xl">
        <div id="seatGrid" class="grid grid-cols-8 gap-3"></div>
    </div>

    <div class="glass rounded-2xl p-6 max-w-2xl mx-auto shadow-2xl">
        <h2 class="text-xl font-medium mb-4 text-gray-200">Selected Seats</h2>
        <div id="selectedSeats" class="space-y-3"></div>
        <div class="flex justify-between items-center mt-6 pt-4 border-t border-gray-700">
            <span class="text-lg text-gray-400">Total</span>
            <span class="text-2xl font-semibold">$<span id="totalPrice">0</span></span>
        </div>
        <button id="confirmBtn" class="mt-6 w-full bg-white text-black py-3 rounded-xl font-medium hover:bg-gray-200 transition">
            Confirm Booking
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            serverTimestamp,
            getDocs 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "github-project-dbcde.firebaseapp.com",
            projectId: "github-project-dbcde",
            storageBucket: "github-project-dbcde.firebasestorage.app",
            messagingSenderId: "470312105710",
            appId: "1:470312105710:web:5a8fb920b1d5c74db965ff"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const rows = ["A","B","C","D","E"];
        const seatsPerRow = 8;
        const prices = { adult: 15, minor: 8 };

        let selectedSeats = {};
        let takenSeats = [];

        const grid = document.getElementById("seatGrid");
        const container = document.getElementById("selectedSeats");

        // 🔥 Load taken seats from Firestore
        async function loadTakenSeats() {
            const querySnapshot = await getDocs(collection(db, "bookings"));
            
            takenSeats = [];

            querySnapshot.forEach(doc => {
                const data = doc.data();
                const seats = data.seats;

                Object.keys(seats).forEach(seatId => {
                    takenSeats.push(seatId);
                });
            });

            renderSeatGrid();
        }

        // 🎟 Render seat grid
        function renderSeatGrid() {
            grid.innerHTML = "";

            rows.forEach(row => {
                for (let i = 1; i <= seatsPerRow; i++) {
                    const seatId = row + i;
                    const seat = document.createElement("div");
                    seat.innerText = seatId;

                    const isTaken = takenSeats.includes(seatId);

                    seat.className = `seat text-center py-2 rounded-lg text-sm font-medium ${
                        isTaken 
                        ? "taken cursor-not-allowed" 
                        : "bg-gray-800 hover:bg-gray-700 cursor-pointer"
                    }`;

                    if (!isTaken) {
                        seat.onclick = () => toggleSeat(seatId, seat);
                    }

                    grid.appendChild(seat);
                }
            });
        }

        function toggleSeat(seatId, element) {
            if (selectedSeats[seatId]) {
                delete selectedSeats[seatId];
                element.classList.remove("selected");
            } else {
                selectedSeats[seatId] = "adult";
                element.classList.add("selected");
            }
            renderSelectedSeats();
        }

        function renderSelectedSeats() {
            container.innerHTML = "";
            let total = 0;

            Object.keys(selectedSeats).forEach(seatId => {
                const type = selectedSeats[seatId];
                total += prices[type];

                const div = document.createElement("div");
                div.className = "flex justify-between items-center";

                div.innerHTML = `
                    <span class="text-gray-300">${seatId}</span>
                    <select class="bg-black border border-gray-700 rounded-lg px-2 py-1 text-sm">
                        <option value="adult" ${type === "adult" ? "selected" : ""}>Adult ($15)</option>
                        <option value="minor" ${type === "minor" ? "selected" : ""}>Minor ($8)</option>
                    </select>
                `;

                container.appendChild(div);

                div.querySelector('select').addEventListener('change', (e) => {
                    selectedSeats[seatId] = e.target.value;
                    renderSelectedSeats();
                });
            });

            document.getElementById("totalPrice").innerText = total;
        }

        // 💾 Save booking
        document.getElementById("confirmBtn").onclick = async () => {
            const seatCount = Object.keys(selectedSeats).length;

            if (seatCount === 0) {
                alert("Please select at least one seat first!");
                return;
            }

            try {
                const docRef = await addDoc(collection(db, "bookings"), {
                    seats: selectedSeats,
                    totalPrice: document.getElementById("totalPrice").innerText,
                    timestamp: serverTimestamp()
                });

                alert("Success! Booking saved. ID: " + docRef.id);

                selectedSeats = {};
                renderSelectedSeats();

                await loadTakenSeats(); // 🔥 refresh taken seats

            } catch (error) {
                console.error(error);
                alert("Error saving booking.");
            }
        };

        // 🚀 Initial load
        loadTakenSeats();
    </script>
</body>
</html>
