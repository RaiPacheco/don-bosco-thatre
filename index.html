<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
    getFirestore, collection, addDoc, serverTimestamp, getDocs 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyD30Bvb6TR_B-TymCbtBQgQFymzsIB2WBw",
    authDomain: "github-project-dbcde.firebaseapp.com",
    projectId: "github-project-dbcde",
    storageBucket: "github-project-dbcde.firebasestorage.app",
    messagingSenderId: "470312105710",
    appId: "1:470312105710:web:5a8fb920b1d5c74db965ff"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const rows = ["A","B","C","D","E"];
const seatsPerRow = 8;
const prices = { adult: 15, minor: 8 };

let takenSeats = [];
let selectedSeats = {};

const grid = document.getElementById("seatGrid");
const container = document.getElementById("selectedSeats");

async function loadTakenSeats() {
    const querySnapshot = await getDocs(collection(db, "bookings"));
    takenSeats = [];

    querySnapshot.forEach((doc) => {
        const data = doc.data();
        const seats = Object.keys(data.seats || {});
        takenSeats.push(...seats);
    });

    renderGrid();
}

function renderGrid() {
    grid.innerHTML = "";

    rows.forEach(row => {
        for (let i = 1; i <= seatsPerRow; i++) {
            const seatId = row + i;
            const seat = document.createElement("div");

            const isTaken = takenSeats.includes(seatId);

            seat.innerText = seatId;
            seat.className = `seat text-center py-2 rounded-lg text-sm font-medium ${
                isTaken 
                ? "taken cursor-not-allowed" 
                : "bg-gray-800 hover:bg-gray-700 cursor-pointer"
            }`;

            if (!isTaken) {
                seat.onclick = () => toggleSeat(seatId, seat);
            }

            grid.appendChild(seat);
        }
    });
}

function toggleSeat(seatId, element) {
    if (selectedSeats[seatId]) {
        delete selectedSeats[seatId];
        element.classList.remove("selected");
    } else {
        selectedSeats[seatId] = "adult";
        element.classList.add("selected");
    }
    renderSelectedSeats();
}

function renderSelectedSeats() {
    container.innerHTML = "";
    let total = 0;

    Object.keys(selectedSeats).forEach(seatId => {
        const type = selectedSeats[seatId];
        total += prices[type];

        const div = document.createElement("div");
        div.className = "flex justify-between items-center";

        div.innerHTML = `
            <span class="text-gray-300">${seatId}</span>
            <select class="bg-black border border-gray-700 rounded-lg px-2 py-1 text-sm">
                <option value="adult" ${type === "adult" ? "selected" : ""}>Adult ($15)</option>
                <option value="minor" ${type === "minor" ? "selected" : ""}>Minor ($8)</option>
            </select>
        `;

        div.querySelector('select').addEventListener('change', (e) => {
            selectedSeats[seatId] = e.target.value;
            renderSelectedSeats();
        });

        container.appendChild(div);
    });

    document.getElementById("totalPrice").innerText = total;
}

document.getElementById("confirmBtn").onclick = async () => {
    if (Object.keys(selectedSeats).length === 0) {
        alert("Please select at least one seat first!");
        return;
    }

    try {
        const docRef = await addDoc(collection(db, "bookings"), {
            seats: selectedSeats,
            totalPrice: document.getElementById("totalPrice").innerText,
            timestamp: serverTimestamp()
        });

        alert("Success! Booking saved. ID: " + docRef.id);

        selectedSeats = {};
        renderSelectedSeats();

        await loadTakenSeats();

    } catch (error) {
        console.error(error);
        alert("Error saving booking");
    }
};

loadTakenSeats();
</script>
